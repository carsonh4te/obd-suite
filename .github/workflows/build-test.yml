name: Build and Test

# run this workflow every time code is pushed to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-suite:
    # GitHub will spin up a temporary Ubuntu server to run these tests
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download code onto the temporary server
    - name: Check out repository code
      uses: actions/checkout@v3

    # Step 2: Check the Python scripts for major syntax errors
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Syntax Check Python Scripts
      run: |
        python -m py_compile scripts/*.py
        echo "All Python scripts passed syntax check!"

    # Step 3: Test the Dockerfile build
    - name: Test Docker Build
      run: |
        docker build -t obd-suite-test .
        echo "Docker image built successfully!"
